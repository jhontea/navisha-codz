apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-deny-all
  namespace: sandbox
  labels:
    app.kubernetes.io/part-of: coding-challange
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-allow-dns
  namespace: sandbox
  labels:
    app.kubernetes.io/part-of: coding-challange
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-allow-worker
  namespace: sandbox
  labels:
    app.kubernetes.io/part-of: coding-challange
spec:
  podSelector:
    matchLabels:
      app: code-execution
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: coding-challange
        - podSelector:
            matchLabels:
              app: execution-worker
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: coding-challange
  labels:
    app.kubernetes.io/part-of: coding-challange
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: coding-challange
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: coding-challange
  labels:
    app.kubernetes.io/part-of: coding-challange
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: coding-challange
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: coding-challange
    - to:
        - namespaceSelector:
            matchLabels:
              name: sandbox
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
