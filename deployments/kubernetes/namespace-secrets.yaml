apiVersion: v1
kind: Namespace
metadata:
  name: coding-challange
  labels:
    app.kubernetes.io/part-of: coding-challange
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: sandbox
  labels:
    app.kubernetes.io/part-of: coding-challange
    name: sandbox
---
# Secrets (in production, use external secret management like Vault)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: coding-challange
  labels:
    app.kubernetes.io/part-of: coding-challange
type: Opaque
stringData:
  host: "postgres"
  port: "5432"
  username: "postgres"
  password: "postgres"
  database: "coding_challange"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: coding-challange
  labels:
    app.kubernetes.io/part-of: coding-challange
type: Opaque
stringData:
  addr: "redis:6379"
  password: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: coding-challange
  labels:
    app.kubernetes.io/part-of: coding-challange
type: Opaque
stringData:
  username: "guest"
  password: "guest"
  erlang-cookie: "secret-erlang-cookie-change-in-production"
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: coding-challange
  labels:
    app.kubernetes.io/part-of: coding-challange
type: Opaque
stringData:
  access-secret: "dev-access-secret-key-change-in-production"
  refresh-secret: "dev-refresh-secret-key-change-in-production"
---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: coding-challange
  labels:
    app.kubernetes.io/part-of: coding-challange
data:
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  DB_MAX_CONNS: "25"
  DB_MIN_CONNS: "5"
  DB_MAX_IDLE_TIME_SEC: "300"
  DB_MAX_LIFETIME_SEC: "3600"
  REDIS_POOL_SIZE: "10"
  RABBITMQ_VHOST: "/"
  SANDBOX_MEMORY_MB: "256"
  SANDBOX_TIME_SEC: "10"
  ENABLE_LOCAL_FALLBACK: "false"
---
# RabbitMQ ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: coding-challange
  labels:
    app.kubernetes.io/part-of: coding-challange
data:
  rabbitmq.conf: |
    loopback_users.guest = false
    listeners.tcp.default = 5672
    management.tcp.port = 15672
    management.load_definitions = /etc/rabbitmq/definitions.json
    cluster_formation.peer_discovery_backend = classic_config
    queue_master_locator = min-masters
    disk_free_limit.relative = 1.5
    vm_memory_high_watermark.relative = 0.6
  definitions.json: |
    {
      "users": [
        {
          "name": "guest",
          "password": "guest",
          "tags": "administrator"
        }
      ],
      "vhosts": [
        {
          "name": "/"
        }
      ],
      "permissions": [
        {
          "user": "guest",
          "vhost": "/",
          "configure": ".*",
          "write": ".*",
          "read": ".*"
        }
      ],
      "exchanges": [
        {
          "name": "code.execution",
          "type": "topic",
          "durable": true,
          "vhost": "/"
        },
        {
          "name": "events",
          "type": "fanout",
          "durable": true,
          "vhost": "/"
        },
        {
          "name": "dlx",
          "type": "direct",
          "durable": true,
          "vhost": "/"
        }
      ],
      "queues": [
        {
          "name": "code.execution.pending",
          "durable": true,
          "vhost": "/",
          "arguments": {
            "x-dead-letter-exchange": "dlx",
            "x-message-ttl": 300000,
            "x-max-priority": 10
          }
        },
        {
          "name": "notifications",
          "durable": true,
          "vhost": "/",
          "arguments": {
            "x-message-ttl": 86400000
          }
        },
        {
          "name": "dead.letter",
          "durable": true,
          "vhost": "/",
          "arguments": {
            "x-message-ttl": 30000
          }
        }
      ],
      "bindings": [
        {
          "source": "code.execution",
          "destination": "code.execution.pending",
          "routing_key": "execution.*",
          "vhost": "/"
        },
        {
          "source": "code.execution",
          "destination": "notifications",
          "routing_key": "notification.*",
          "vhost": "/"
        },
        {
          "source": "dlx",
          "destination": "dead.letter",
          "routing_key": "dead.letter",
          "vhost": "/"
        }
      ]
    }
