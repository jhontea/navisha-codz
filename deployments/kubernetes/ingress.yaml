apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coding-challange-ingress
  namespace: coding-challange
  labels:
    app.kubernetes.io/part-of: coding-challange
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Request-ID"
    # TLS cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.coding-challange.local
        - ws.coding-challange.local
      secretName: coding-challange-tls
  rules:
    - host: api.coding-challange.local
      http:
        paths:
          # Auth Service
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 9101
          # Problem Service
          - path: /api/problems
            pathType: Prefix
            backend:
              service:
                name: problem-service
                port:
                  number: 9102
          # Execution Service
          - path: /api/submissions
            pathType: Prefix
            backend:
              service:
                name: execution-service
                port:
                  number: 9103
          # Leaderboard Service
          - path: /api/leaderboard
            pathType: Prefix
            backend:
              service:
                name: leaderboard-service
                port:
                  number: 9104
          # Hint Service
          - path: /api/hints
            pathType: Prefix
            backend:
              service:
                name: hint-service
                port:
                  number: 9105
          # Health checks
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: execution-service
                port:
                  number: 9103

    - host: ws.coding-challange.local
      http:
        paths:
          # WebSocket Service
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: websocket-service
                port:
                  number: 9107

---
# Ingress for internal cluster communication
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coding-challange-internal-ingress
  namespace: coding-challange
  labels:
    app.kubernetes.io/part-of: coding-challange
    app.kubernetes.io/component: internal
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /internal
            pathType: Prefix
            backend:
              service:
                name: websocket-service
                port:
                  number: 9107
