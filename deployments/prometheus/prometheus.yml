# Prometheus Configuration — Coding Challenge Platform
# Scrapes all microservices, infrastructure, and node metrics.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # Uncomment if alertmanager is deployed:
          # - alertmanager:9093

rule_files:
  - "alerts/*.yml"

scrape_configs:
  # ============================================
  # Application Services (Go / Gin)
  # ============================================

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:9101']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'auth'

  - job_name: 'problem-service'
    static_configs:
      - targets: ['problem-service:9102']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'problem'

  - job_name: 'execution-service'
    static_configs:
      - targets: ['execution-service:9103']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'execution'

  - job_name: 'execution-worker'
    static_configs:
      - targets: ['execution-worker:9106']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'execution-worker'

  - job_name: 'leaderboard-service'
    static_configs:
      - targets: ['leaderboard-service:9104']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'leaderboard'

  - job_name: 'hint-service'
    static_configs:
      - targets: ['hint-service:9105']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'hint'

  - job_name: 'websocket-service'
    static_configs:
      - targets: ['websocket-service:9107']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'websocket'

  # ============================================
  # Gateway
  # ============================================

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:9100']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'gateway'

  # ============================================
  # Infrastructure Exporters
  # Note: add exporter containers to docker-compose.yml under profile: monitoring
  # before these targets become reachable.
  # ============================================

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'postgres'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'redis'

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq-exporter:9419']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'rabbitmq'

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'node'

  # ============================================
  # Prometheus self-monitoring
  # ============================================

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'
