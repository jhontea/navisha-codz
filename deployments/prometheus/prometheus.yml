# Prometheus Configuration — Coding Challenge Platform
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "alerts/*.yml"

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:9101']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'auth'

  - job_name: 'problem-service'
    static_configs:
      - targets: ['problem-service:9102']

  - job_name: 'execution-service'
    static_configs:
      - targets: ['execution-service:8083']

  - job_name: 'execution-worker'
    static_configs:
      - targets: ['execution-worker:8086']

  - job_name: 'leaderboard-service'
    static_configs:
      - targets: ['leaderboard-service:9104']

  - job_name: 'hint-service'
    static_configs:
      - targets: ['hint-service:9105']

  - job_name: 'websocket-service'
    static_configs:
      - targets: ['websocket-service:9107']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:9100']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq-exporter:9419']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
