syntax = "proto3";

package submission.v1;

option go_package = "coding-challange/proto/submission/v1;submissionv1";

// SubmissionService handles code submission operations.
service SubmissionService {
    // CreateSubmission creates a new code submission.
    rpc CreateSubmission(CreateSubmissionRequest) returns (CreateSubmissionResponse);

    // GetSubmission retrieves the status and result of a submission.
    rpc GetSubmission(GetSubmissionRequest) returns (GetSubmissionResponse);

    // UpdateSubmissionStatus updates the status of a submission (called by worker).
    rpc UpdateSubmissionStatus(UpdateSubmissionStatusRequest) returns (UpdateSubmissionStatusResponse);

    // StreamSubmissions streams submission updates for real-time status.
    rpc StreamSubmissions(StreamSubmissionsRequest) returns (stream SubmissionUpdate);
}

// LeaderboardService handles leaderboard operations.
service LeaderboardService {
    // UpdateScore updates a user's leaderboard score.
    rpc UpdateScore(UpdateScoreRequest) returns (UpdateScoreResponse);

    // GetRanking retrieves the current ranking.
    rpc GetRanking(GetRankingRequest) returns (GetRankingResponse);

    // StreamLeaderboard streams leaderboard updates.
    rpc StreamLeaderboard(StreamLeaderboardRequest) returns (stream LeaderboardUpdate);
}

// --- Submission Messages ---

message CreateSubmissionRequest {
    string user_id = 1;
    int32 problem_id = 2;
    string code = 3;
    string language = 4;
}

message CreateSubmissionResponse {
    string submission_id = 1;
    string status = 2;
}

message GetSubmissionRequest {
    string submission_id = 1;
}

message GetSubmissionResponse {
    string submission_id = 1;
    string user_id = 2;
    int32 problem_id = 3;
    string code = 4;
    string language = 5;
    string status = 6;
    int32 score = 7;
    int32 execution_time_ms = 8;
    int32 memory_used_kb = 9;
    int32 test_cases_passed = 10;
    int32 test_cases_total = 11;
    string error_message = 12;
    string submitted_at = 13;
    string completed_at = 14;
    repeated TestCaseResult results = 15;
}

message TestCaseResult {
    int32 test_case_id = 1;
    string status = 2;
    int32 execution_time_ms = 3;
    int32 memory_used_kb = 4;
    string actual_output = 5;
    string error_message = 6;
}

message UpdateSubmissionStatusRequest {
    string submission_id = 1;
    string status = 2;
    int32 score = 3;
    int32 execution_time_ms = 4;
    int32 memory_used_kb = 5;
    int32 test_cases_passed = 6;
    int32 test_cases_total = 7;
    string error_message = 8;
    repeated TestCaseResult results = 9;
}

message UpdateSubmissionStatusResponse {
    bool success = 1;
}

message StreamSubmissionsRequest {
    string user_id = 1;
    repeated string submission_ids = 2;
}

message SubmissionUpdate {
    string submission_id = 1;
    string status = 2;
    int32 score = 3;
    string message = 4;
}

// --- Leaderboard Messages ---

message UpdateScoreRequest {
    string user_id = 1;
    string submission_id = 2;
    int32 problem_id = 3;
    int32 score = 4;
    int32 execution_time_ms = 5;
    string difficulty = 6;
}

message UpdateScoreResponse {
    bool success = 1;
    int32 new_rank = 2;
    int32 previous_rank = 3;
}

message GetRankingRequest {
    string contest_id = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message GetRankingResponse {
    repeated LeaderboardEntry entries = 1;
    int32 total = 2;
}

message LeaderboardEntry {
    int32 rank = 1;
    string user_id = 2;
    string username = 3;
    int32 total_score = 4;
    int32 problems_solved = 5;
}

message StreamLeaderboardRequest {
    string contest_id = 1;
}

message LeaderboardUpdate {
    repeated LeaderboardEntry entries = 1;
    string update_type = 2;
    string timestamp = 3;
}

// --- Enums ---

enum SubmissionStatus {
    SUBMISSION_STATUS_UNSPECIFIED = 0;
    SUBMISSION_STATUS_PENDING = 1;
    SUBMISSION_STATUS_QUEUED = 2;
    SUBMISSION_STATUS_RUNNING = 3;
    SUBMISSION_STATUS_COMPLETED = 4;
    SUBMISSION_STATUS_FAILED = 5;
    SUBMISSION_STATUS_TIMEOUT = 6;
    SUBMISSION_STATUS_RUNTIME_ERROR = 7;
    SUBMISSION_STATUS_COMPILATION_ERROR = 8;
    SUBMISSION_STATUS_OOM = 9;
}

enum TestResultStatus {
    TEST_RESULT_STATUS_UNSPECIFIED = 0;
    TEST_RESULT_STATUS_PASSED = 1;
    TEST_RESULT_STATUS_FAILED = 2;
    TEST_RESULT_STATUS_TIMEOUT = 3;
    TEST_RESULT_STATUS_ERROR = 4;
}
