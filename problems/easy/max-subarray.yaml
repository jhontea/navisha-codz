id: "max-subarray"
title: "Maximum Subarray"
type: "function"
difficulty: "easy"
category: "array"
tags: ["array", "dynamic-programming", "divide-and-conquer"]

description: |
  Given an integer array `nums`, find the subarray with the largest sum,
  and return its sum.

  A subarray is a contiguous non-empty sequence of elements within an array.

function_name: "maxSubArray"
parameters:
  - name: "nums"
    type: "[]int"
    description: "Array of integers"
return_type: "int"

examples:
  - input: "nums = [-2,1,-3,4,-1,2,1,-5,4]"
    output: "6"
    explanation: "The subarray [4,-1,2,1] has the largest sum 6."
  - input: "nums = [1]"
    output: "1"
    explanation: "The subarray [1] has the largest sum 1."
  - input: "nums = [5,4,-1,7,8]"
    output: "23"
    explanation: "The entire array is the subarray with the largest sum."

hints:
  - level: 1
    title: "Kadane's algorithm"
    content: "Think about tracking the maximum sum ending at each position. If adding the current element makes it negative, start fresh from the next element."
  - level: 2
    title: "Two variables"
    content: "Use one variable to track the running sum (current) and another for the best sum so far (best). Initialize both with the first element."
  - level: 3
    title: "Reset when negative"
    content: |
      For each element:
      1. Add it to current sum
      2. Update best if current is better
      3. Reset current to 0 if it becomes negative (since negative sum won't help future subarrays)

template: |
  func maxSubArray(nums []int) int {
      // Your code here
      // Hint: Try Kadane's algorithm - track current sum and best sum
      // Example: for each num, current = max(num, current + num), best = max(best, current)
      return 0
  }

test_cases:
  - params: [[[-2, 1, -3, 4, -1, 2, 1, -5, 4]]]
    expected: 6
    description: "Mixed positive and negative"
  - params: [[[1]]]
    expected: 1
    description: "Single element"
  - params: [[[5, 4, -1, 7, 8]]]
    expected: 23
    description: "All positive except one"
  - params: [[[-1]]]
    expected: -1
    description: "Single negative"
  - params: [[[-2, -1]]]
    expected: -1
    description: "All negative"

constraints:
  - "1 ≤ len(nums) ≤ 10⁵"
  - "-10⁴ ≤ nums[i] ≤ 10⁴"

time_complexity_hint: "O(n)"
space_complexity_hint: "O(1)"

solution:
  code: |
    func maxSubArray(nums []int) int {
        current := nums[0]
        best := nums[0]
        for i := 1; i < len(nums); i++ {
            if current < 0 {
                current = nums[i]
            } else {
                current += nums[i]
            }
            if current > best {
                best = current
            }
        }
        return best
    }
  approach: "Kadane's algorithm"
  time_complexity: "O(n)"
  space_complexity: "O(1)"
