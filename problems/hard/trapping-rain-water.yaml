id: "trapping-rain-water"
title: "Trapping Rain Water"
type: "function"
difficulty: "hard"
category: "array"
tags: ["array", "two-pointers", "dynamic-programming", "stack"]

description: |
  Given `n` non-negative integers representing an elevation map where the width
  of each bar is 1, compute how much water it can trap after raining.

function_name: "trap"
parameters:
  - name: "height"
    type: "[]int"
    description: "Elevation map where each element represents bar height"
return_type: "int"

examples:
  - input: "height = [0,1,0,2,1,0,1,3,2,1,2,1]"
    output: "6"
    description: "Water trapped between bars of various heights."
  - input: "height = [4,2,0,3,2,5]"
    output: "9"
    description: "Deep valley between two tall bars."

hints:
  - level: 1
    title: "Water above each bar"
    content: "The water level above each bar is determined by the minimum of the tallest bar to its left and the tallest bar to its right, minus its own height."
  - level: 2
    title: "Precompute max arrays"
    content: "Build a leftMax array (max height from left up to index i) and rightMax array (max height from right up to index i). Water at i = min(leftMax[i], rightMax[i]) - height[i]."
  - level: 3
    title: "Two-pointer approach"
    content: |
      Use two pointers (left, right) and track leftMax and rightMax:
      - If height[left] < height[right], water at left depends on leftMax
      - Otherwise, water at right depends on rightMax
      - Move the pointer with smaller height inward

template: |
  func trap(height []int) int {
      // Your code here
      // Hint: Think about the water level above each position
      // Water at position i = min(max_left[i], max_right[i]) - height[i]
      // Example: for [0,1,0,2,1,0,1,3,2,1,2,1], the answer is 6
      return 0
  }

test_cases:
  - params: [[[0, 1, 0, 2, 1, 0, 1, 3, 2, 1, 2, 1]]]
    expected: 6
    description: "Standard case"
  - params: [[[4, 2, 0, 3, 2, 5]]]
    expected: 9
    description: "Deep valley"
  - params: [[[1, 2, 3, 4, 5]]]
    expected: 0
    description: "Ascending - no water trapped"
  - params: [[[5, 4, 3, 2, 1]]]
    expected: 0
    description: "Descending - no water trapped"
  - params: [[[3, 0, 3]]]
    expected: 3
    description: "Simple valley"

constraints:
  - "1 ≤ n ≤ 2 × 10⁴"
  - "0 ≤ height[i] ≤ 10⁵"

time_complexity_hint: "O(n)"
space_complexity_hint: "O(1)"

solution:
  code: |
    func trap(height []int) int {
        if len(height) == 0 {
            return 0
        }
        left, right := 0, len(height)-1
        leftMax, rightMax := height[left], height[right]
        water := 0
        for left < right {
            if height[left] < height[right] {
                left++
                if height[left] > leftMax {
                    leftMax = height[left]
                }
                water += leftMax - height[left]
            } else {
                right--
                if height[right] > rightMax {
                    rightMax = height[right]
                }
                water += rightMax - height[right]
            }
        }
        return water
    }
  approach: "Two-pointer with running max"
  time_complexity: "O(n)"
  space_complexity: "O(1)"
