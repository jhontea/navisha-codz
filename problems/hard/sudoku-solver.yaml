hints:
  - level: 1
    title: "Backtracking"
    content: "Try placing digits 1-9 in empty cells. If a placement leads to a dead end, backtrack and try a different digit."
  - level: 2
    title: "Validate placement"
    content: "To check if a digit can be placed at board[row][col], verify it's not already in the same row, column, or 3×3 box."
  - level: 3
    title: "Box check formula"
    content: |
      For box indexing: boxRow = (row/3)*3, boxCol = (col/3)*3
      
      Recursive approach:
      1. Find next empty cell
      2. Try digits '1' through '9' that are valid
      3. Place digit, recurse, unplace if failed
      4. Return true when all cells are filled

