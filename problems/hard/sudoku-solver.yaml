id: "sudoku-solver"
title: "Sudoku Solver"
type: "function"
difficulty: "hard"
category: "matrix"
tags: ["backtracking", "matrix", "recursion"]

description: |
  Write a program to solve a Sudoku puzzle by filling the empty cells.

  A sudoku solution must satisfy all of the following rules:

  1. Each of the digits 1-9 must occur exactly once in each row.
  2. Each of the digits 1-9 must occur exactly once in each column.
  3. Each of the digits 1-9 must occur exactly once in each of the 9
     3 × 3 sub-boxes of the grid.

  The '.' character indicates empty cells. Modify the board in-place.

function_name: "solveSudoku"
parameters:
  - name: "board"
    type: "[][]byte"
    description: "9×9 Sudoku board with '.' for empty cells"
return_type: "void"

