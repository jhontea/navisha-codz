    expected: [["5","1","9","7","4","8","6","3","2"],["7","8","3","6","5","2","4","1","9"],["4","2","6","1","3","9","8","7","5"],["3","5","7","9","8","6","2","4","1"],["2","6","4","3","1","7","5","9","8"],["1","9","8","5","2","4","3","6","7"],["9","7","5","8","6","3","1","2","4"],["8","3","2","4","9","1","7","5","6"],["6","4","1","2","7","5","9","8","3"]]
    description: "Medium difficulty Sudoku"

constraints:
  - "len(board) == 9"
  - "len(board[i]) == 9"
  - "board[i][j] is a digit 1-9 or '.'."
  - "The input board is guaranteed to have exactly one solution."

time_complexity_hint: "O(9ⁿ) where n is the number of empty cells"
space_complexity_hint: "O(9²) for the board"

solution:
  code: |
    func solveSudoku(board [][]byte) {
        var backtrack func() bool
        backtrack = func() bool {
            for row := 0; row < 9; row++ {
                for col := 0; col < 9; col++ {
                    if board[row][col] != '.' {
                        continue
                    }
                    for digit := byte('1'); digit <= '9'; digit++ {
                        if isValid(board, row, col, digit) {
                            board[row][col] = digit
                            if backtrack() {
                                return true
                            }
                            board[row][col] = '.'
                        }
                    }
                    return false
                }
            }
            return true
        }
        backtrack()
    }

    func isValid(board [][]byte, row, col int, digit byte) bool {
        for i := 0; i < 9; i++ {
            if board[row][i] == digit {
                return false
            }
            if board[i][col] == digit {
                return false
            }
            boxRow := (row/3)*3 + i/3
            boxCol := (col/3)*3 + i%3
            if board[boxRow][boxCol] == digit {
                return false
            }
        }
        return true
    }
  approach: "Backtracking with row/col/box validation"
  time_complexity: "O(9ⁿ)"
  space_complexity: "O(9²)"
