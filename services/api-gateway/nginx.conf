events {
    worker_connections 1024;
}

http {
    # Upstream definitions
    upstream auth_service {
        server auth-service:9101;
    }

    upstream problem_service {
        server problem-service:9102;
    }

    upstream execution_service {
        server execution-service:8083;
    }

    upstream leaderboard_service {
        server leaderboard-service:9104;
    }

    upstream hint_service {
        server hint-service:9105;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Health check
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # Auth routes
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # Problem routes
        location /api/problems {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://problem_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Execution routes
        location /api/submissions {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://execution_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket endpoint
        location /api/ws/ {
            proxy_pass http://execution_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # Leaderboard routes
        location /api/leaderboard {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://leaderboard_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_valid 200 1m;
        }

        # User stats routes
        location /api/users/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://leaderboard_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Hint routes
        location /api/problems/ {
            limit_req zone=api burst=20 nodelay;
            # Match hint routes specifically
            location ~ ^/api/problems/\d+/hints {
                proxy_pass http://hint_service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
            # Fall back to problem service
            proxy_pass http://problem_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 404 fallback
        location / {
            return 404 '{"error":"not found","message":"The requested endpoint does not exist"}';
            add_header Content-Type application/json;
        }
    }
}
