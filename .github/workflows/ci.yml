name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Run Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Go Test
        run: go test ./... -count=1 -race -coverprofile=coverage.out -covermode=atomic
      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.out

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build All Services
        run: make build

  docker:
    name: Docker Build & Push
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push Services
        run: |
          for service in auth-service problem-service execution-service leaderboard-service hint-service websocket-service; do
            docker buildx build \
              --cache-from=type=gha \
              --cache-to=type=gha,mode=max \
              -f services/$service/Dockerfile \
              -t ghcr.io/${{ github.repository }}/$service:latest \
              -t ghcr.io/${{ github.repository }}/$service:${{ github.sha }} \
              --push .
          done

  e2e:
    name: End-to-End Tests
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Services
        run: docker-compose up -d
      - name: Wait for Health
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:9100/health && break
            sleep 2
          done
      - name: Run Integration Tests
        run: go test ./tests/integration/... -v -count=1
