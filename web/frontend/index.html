<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Coding Challenge Platform - Master Algorithms &amp; Data Structures</title>
    <meta name="title" content="Coding Challenge Platform" />
    <meta name="description" content="Practice coding challenges and master algorithms &amp; data structures with our curated problem set. Improve your problem-solving skills with interactive coding exercises." />
    <meta name="theme-color" content="#4f46e5" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://codingchall.vercel.app/" />
    <meta property="og:title" content="Coding Challenge Platform" />
    <meta property="og:description" content="Practice coding challenges and master algorithms &amp; data structures with our curated problem set." />
    <meta property="og:image" content="https://codingchall.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Coding Challenge Platform" />
    <meta name="twitter:description" content="Practice coding challenges and master algorithms &amp; data structures with our curated problem set." />
    <meta name="twitter:image" content="https://codingchall.vercel.app/og-image.png" />

    <!-- Favicon (inline SVG — no external file request) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%234f46e5'/%3E%3Cpath d='M12 22l-6-6 6-6 1.4 1.4L8.8 16l4.6 4.6L12 22zm8 0l6-6-6-6-1.4 1.4L23.2 16l-4.6 4.6L20 22z' fill='white'/%3E%3C/svg%3E" />

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CodeChallenge" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Font Preloading: preconnect + preload actual font files -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>

    <!-- Remove render-blocking: deferred inline stylesheet -->
    <style>
      /* Critical inline CSS — renders before external fonts load */
      html { scroll-behavior: smooth; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
